name: nvim-docs
on:
  push:
    branches:
      - master
    paths:
      - 'packages/nvim-esmodtree/**'

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-mise-with-lua-deps

      - name: Install pandoc and neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc neovim

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate vim docs
        run: pnpm docgen
        working-directory: packages/nvim-esmodtree

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/nvim-esmodtree/doc/*
          git diff --staged --quiet || git commit -m "chore(ci): auto-generate vimdoc"
          git push
