name: nvim-release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  luarocks-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup mise with Lua deps
        uses: ./.github/actions/setup-mise-with-lua-deps
      - name: LuaRocks Upload
        working-directory: packages/nvim-esmodtree
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: luarocks upload nvim-esmodtree-scm-1.rockspec --api-key="$LUAROCKS_API_KEY"
