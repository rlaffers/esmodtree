name: Release

on:
  push:
    branches: [master]
    paths:
      - 'packages/cli/**'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-mise-with-lua-deps

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm --filter @esmodtree/cli build

      - run: pnpm --filter @esmodtree/cli test

      - run: pnpm --filter @esmodtree/cli exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
