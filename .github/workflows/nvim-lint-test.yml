---
name: nvim-lint-test
on:
  push:
    branches:
      - master
    paths:
      - 'packages/nvim-esmodtree/**'
  pull_request:
    branches:
      - master
    paths:
      - 'packages/nvim-esmodtree/**'

jobs:
  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --color always --check packages/nvim-esmodtree/lua

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        nvim-versions: ['stable', 'nightly']
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.nvim-versions }})
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-versions }}

      - name: run tests
        working-directory: packages/nvim-esmodtree
        run: make test
